<div class="meal-item" (click)="isExpanded = !isExpanded">
  <div class="item-content">
    <div class="row1">
      <p>{{ item.name }}</p>
      <p id="calories">{{ item.calories }}</p>
    </div>

    <div class="row2">
      <p>{{ item.quantity }} {{ item.serving }}</p>
      <p>kcal</p>
    </div>

    <div class="hidden-content" [class.visible]="isExpanded">
      <p>Carbs: 10g</p>
      <p>Protein: 20g</p>
      <p>Fat: 30g</p>
    </div>
  </div>
</div>
