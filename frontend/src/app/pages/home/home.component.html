<div class="page-container">
  <h1 class="page-title">Home</h1>

  <button class="action-button" (click)="checkBackendHealth()">Check Backend API Health</button>
  @if (statusMessage()) {
    <p class="status-message">{{ statusMessage() }}</p>
  }

  <button class="action-button" (click)="getFoodLogs()">Get Food Logs</button>
  @if (foodLogsMessage()) {
    <p class="status-message">{{ foodLogsMessage() }}</p>
  }

  @if (foodLogs().length > 0) {
    <div class="food-logs">
      <h2>Food Logs</h2>
      @for (log of foodLogs(); track log.id) {
        <div class="food-log-item">
          <strong>{{ log.meal }}</strong>: {{ log.ingredient }} - {{ log.quantity }} {{ log.unit }} ({{ log.calories }} cal)
        </div>
      }
    </div>
  }
</div>
