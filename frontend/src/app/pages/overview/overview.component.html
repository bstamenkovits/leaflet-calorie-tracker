<div class="overview-container">
  <div class="top-banner">
    <h2>Good Morning!</h2>
    <p-datepicker [(ngModel)]="date" dateFormat="DD dd M yy" class="date-display"/>
  </div>


  <div class="scrollable-content">
    <div id="breakfast" class="meal-container">
      <h3>Breakfast</h3>
      <meal-item *ngFor="let item of breakfastItems" [item]="item"></meal-item>
      <meal-item *ngIf="addingBreakfast" [item]="newBreakfastItem" [expanded]="true"></meal-item>
      <div class="add-meal-item" *ngIf="!addingBreakfast" (click)="addingBreakfast = true"> + </div>
    </div>
  </div>

</div>
